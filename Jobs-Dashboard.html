<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Dashboard | STACKLY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Michroma&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <div class="dashboard-wrapper">
        <div class="dash-overlay" id="dashOverlay"></div>
        <!-- Sidebar -->
        <aside class="dash-sidebar">
            <a href="index.html" class="dash-brand"><span class="logo-brand">STACKLY</span></a>
            
            <nav class="dash-nav">
                <ul class="dash-nav-list">
                    <li><a href="Jobs-Dashboard.html" class="dash-nav-link active"><i class="ri-dashboard-line"></i> Overview</a></li>
                    <li><a href="Applications.html" class="dash-nav-link"><i class="ri-briefcase-line"></i> Applications</a></li>
                    <li><a href="SavedJobs.html" class="dash-nav-link"><i class="ri-heart-line"></i> Saved Jobs</a></li>
                    <li><a href="Wallet.html" class="dash-nav-link"><i class="ri-wallet-line"></i> Wallet</a></li>
                </ul>
            </nav>

            <a href="Login.html" class="dash-nav-link dash-logout">
                <i class="ri-logout-box-r-line"></i> Log Out
            </a>
        </aside>

        <!-- Main Content -->
        <main class="dash-main">
            <header class="dash-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="ri-menu-2-line"></i>
                </button>
                <div class="dash-breadcrumb">
                    <a href="index.html" class="back-link-inline" style="color: var(--text-muted); font-size: 0.9rem; margin-right: 2.5rem; display: flex; align-items: center; gap: 0.5rem;">
                        <i class="ri-arrow-left-line"></i> Back to Home
                    </a>
                </div>
                <div class="dash-welcome">
                    Welcome, Candidate <i class="ri-user-smile-line"></i>
                </div>
            </header>

            <section class="dash-content animate-on-scroll">
                <div class="dash-stats-grid">
                    <div class="dash-stat-card">
                        <p class="stat-title">Applications Sent</p>
                        <div class="stat-value">
                            24 
                            <span class="stat-trend trend-up"><i class="ri-arrow-right-up-line"></i> +12%</span>
                        </div>
                    </div>
                    <div class="dash-stat-card">
                        <p class="stat-title">Interviews Scheduled</p>
                        <div class="stat-value">
                            3
                            <span class="stat-trend trend-up"><i class="ri-calendar-check-line"></i> Next: 2PM</span>
                        </div>
                    </div>
                    <div class="dash-stat-card">
                        <p class="stat-title">Profile Visibility</p>
                        <div class="stat-value">
                            458 
                            <span class="stat-trend trend-up"><i class="ri-eye-line"></i> High</span>
                        </div>
                    </div>
                </div>

                <!-- Simple Graph Mockup for Spending History/Activity -->
                <div class="dash-chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">Profile Impressions</h3>
                        <span style="color: #64748b; font-size: 0.9rem;">Last 30 Days</span>
                    </div>
                    <div class="mock-graph">
                        <svg class="mock-line" viewBox="0 0 400 150" preserveAspectRatio="none" style="overflow: visible;">
                            <defs>
                                <linearGradient id="area-gradient-jobs" x1="0" x2="0" y1="0" y2="1">
                                    <stop offset="0%" stop-color="var(--secondary-color)" stop-opacity="0.3" />
                                    <stop offset="100%" stop-color="var(--secondary-color)" stop-opacity="0" />
                                </linearGradient>
                            </defs>
                            <!-- Area fill -->
                            <path d="M0,130 C 80,100 120,80 200,60 C 280,40 320,60 400,30 L400,150 L0,150 Z" fill="url(#area-gradient-jobs)"></path>
                            <!-- Main line -->
                            <path d="M0,130 C 80,100 120,80 200,60 C 280,40 320,60 400,30" stroke="var(--secondary-color)" fill="none" stroke-width="4"></path>
                            <!-- Data Points -->
                            <circle cx="200" cy="60" r="5" fill="var(--secondary-color)"></circle>
                            <circle cx="400" cy="30" r="5" fill="var(--secondary-color)"></circle>
                            <!-- Tooltip Markers -->
                            <text x="180" y="45" fill="var(--text-main)" font-size="10" font-weight="700">142 Views</text>
                            <text x="350" y="15" fill="var(--text-main)" font-size="10" font-weight="700">210 Views</text>
                        </svg>
                        <!-- Grid Labels -->
                        <div style="display: flex; justify-content: space-between; margin-top: 1rem; color: var(--text-muted); font-size: 0.75rem; font-weight: 600;">
                            <span>Week 1</span>
                            <span>Week 2</span>
                            <span>Week 3</span>
                            <span>Week 4</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.dash-sidebar');
        const overlay = document.getElementById('dashOverlay');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
        }
        if (overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
    </script>
</body>
</html>
