<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Dashboard | Stackly Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="dash-sidebar">
            <a href="index.html" class="dash-brand">STACKLY <span style="color: #4F46E5;">PRO</span></a>
            
            <nav class="dash-nav">
                <ul class="dash-nav-list">
                    <li><a href="#" class="dash-nav-link active"><i class="ri-pie-chart-2-line"></i> Analytics</a></li>
                    <li><a href="404.html" class="dash-nav-link"><i class="ri-user-search-line"></i> Talent Pool</a></li>
                    <li><a href="404.html" class="dash-nav-link"><i class="ri-book-open-line"></i> Job Listings</a></li>
                    <li><a href="404.html" class="dash-nav-link"><i class="ri-hand-coin-line"></i> Payouts</a></li>
                    <li><a href="404.html" class="dash-nav-link"><i class="ri-customer-service-2-line"></i> Support</a></li>
                </ul>
            </nav>

            <a href="index.html" class="dash-nav-link dash-logout">
                <i class="ri-logout-box-r-line"></i> Log Out
            </a>
        </aside>

        <!-- Main Content -->
        <main class="dash-main">
            <header class="dash-header">
                <div class="dash-breadcrumb">
                    <a href="index.html" class="back-link-inline" style="color: #64748b; font-size: 0.9rem; margin-right: 2rem;">
                        <i class="ri-arrow-left-line"></i> Back to Home
                    </a>
                </div>
                <div class="dash-welcome" style="background: #e2e8f0; color: #000;">
                    Welcome, HR Manager <i class="ri-briefcase-4-line"></i>
                </div>
            </header>

            <section class="dash-content animate-on-scroll">
                <div class="dash-stats-grid">
                    <div class="dash-stat-card">
                        <p class="stat-title">Total Talent Recruited</p>
                        <div class="stat-value">
                            $24,500 
                            <span class="stat-trend trend-up"><i class="ri-arrow-right-up-line"></i> +15%</span>
                        </div>
                    </div>
                    <div class="dash-stat-card">
                        <p class="stat-title">Active Candidates</p>
                        <div class="stat-value">
                            342 
                            <span class="stat-trend trend-up"><i class="ri-add-line"></i> +8%</span>
                        </div>
                    </div>
                    <div class="dash-stat-card">
                        <p class="stat-title">Hire-to-Offer Ratio</p>
                        <div class="stat-value">
                            2.4% 
                            <span class="stat-trend trend-down"><i class="ri-arrow-right-down-line"></i> -1%</span>
                        </div>
                    </div>
                    <div class="dash-stat-card">
                        <p class="stat-title">Active Listings</p>
                        <div class="stat-value">
                            18
                        </div>
                    </div>
                </div>

                <!-- HR Performance Graph Mockup -->
                <div class="dash-chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">Revenue Trajectory</h3>
                        <span style="color: #64748b; font-size: 0.9rem;">Last 30 Days</span>
                    </div>
                    <div class="mock-graph">
                        <svg class="mock-line" viewBox="0 0 400 100">
                            <path d="M0,90 Q100,20 200,80 T400,10" stroke="#4F46E5" fill="none" stroke-width="5"></path>
                        </svg>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
