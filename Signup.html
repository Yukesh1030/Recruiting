<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Stackly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #05070a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <i class="ri-arrow-left-line"></i> Back to Home
    </a>

    <div class="auth-wrapper animate-on-scroll">
        <div class="auth-card">
            <div class="auth-icon-wrapper">
                <i class="ri-user-add-fill auth-main-icon"></i>
            </div>
            
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join STACKLY and build your future</p>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" id="fullName" class="auth-input" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>JOIN AS</label>
                    <select id="userRole" class="auth-input" required>
                        <option value="hr">HR</option>
                        <option value="jobseeker" selected>Job seekers</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                </div>

                <div class="form-checkbox-group">
                  <input type="checkbox" id="terms" required>
                  <label for="terms">I agree to the <a href="404.html" class="auth-link">Terms of Service</a> and <a href="404.html" class="auth-link">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn btn-auth-action">
                    Create Account
                </button>
            </form>

            <p class="auth-footer-text">
                Already have an account? <a href="Login.html" class="auth-link">Login</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
