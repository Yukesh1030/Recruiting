<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | STACKLY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Michroma&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #05070a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <i class="ri-arrow-left-line"></i> Back to Home
    </a>

    <div class="auth-wrapper animate-on-scroll">
        <div class="auth-card">
            <div class="auth-icon-wrapper">
                <i class="ri-shield-fill auth-main-icon"></i>
            </div>
            
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to access your STACKLY account</p>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>LOGIN AS</label>
                    <select id="userRole" class="auth-input" required>
                        <option value="hr">HR</option>
                        <option value="jobseeker">Job seekers</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-auth-action">
                    Login <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <div class="sample-credentials">
                <p class="sample-title">SAMPLE CREDENTIALS</p>
                <div class="cred-row">
                    <span>Email:</span>
                    <code id="sampleEmail">admin@stackly.com</code>
                </div>
                <div class="cred-row">
                    <span>Password:</span>
                    <code>admin123</code>
                </div>
            </div>

            <p class="auth-footer-text">
                Don't have an account? <a href="Signup.html" class="auth-link">Sign up</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>
</html>
